services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: ["backend"]
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    environment:
      HEALTH_CONFIG_PATH: /app/runs/health-config.local.json
      HEALTH_RUNS_DIR: /app/runs/health
      HEALTH_UI_RUNS_DIR: /app/runs/health
      HEALTH_UI_HOST: 0.0.0.0
      HEALTH_UI_PORT: "8080"
      KUBECONFIG: /app/kubeconfig/config
      PYTHONPATH: /app/src
    ports:
      - "8080:8080"
    volumes:
      - ./runs:/app/runs
      - ./podman/kubeconfig:/app/kubeconfig:Z

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: ["scheduler"]
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    environment:
      HEALTH_CONFIG_PATH: /app/runs/health-config.local.json
      HEALTH_RUNS_DIR: /app/runs/health
      KUBECONFIG: /app/kubeconfig/config
      PYTHONPATH: /app/src
    volumes:
      - ./runs:/app/runs
      - ./podman/kubeconfig:/app/kubeconfig:Z

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    depends_on:
      - backend
    environment:
      VITE_BACKEND_HOST: backend
      VITE_BACKEND_PORT: "8080"
      FRONTEND_HOST: "0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend:Z
      - frontend_node_modules:/app/frontend/node_modules

volumes:
  frontend_node_modules:
